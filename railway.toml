[deploy]
startCommand = "npx prisma migrate resolve --rolled-back 20260505172201_make_org_required 2>/dev/null; npx tsx scripts/org-migrate.ts; npx prisma migrate deploy && node node_modules/.bin/next start -p ${PORT:-3000} -H 0.0.0.0"
healthcheckPath = "/login"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
